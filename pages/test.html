<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dialog Before Overlay</title>

```
<style>
    body{
        font-family: Arial, sans-serif;
        height:200vh;
        padding:40px;
    }

    button{
        padding:10px 20px;
        cursor:pointer;
    }

    /* WRAPPER */
    .dialog-wrapper{
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        opacity: 0;
        transition: 0.2s;
    }

    .dialog-wrapper.active{
        display: flex;
        opacity: 1;
    }

    /* OVERLAY bằng before */
    .dialog-wrapper::before{
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.4);
    }

    /* DIALOG */
    .dialog{
        position: relative;
        z-index: 1;
        width: 400px;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    input{
        width:100%;
        padding:8px;
        margin-top:10px;
    }

    .dialog-footer{
        margin-top:20px;
        display:flex;
        justify-content:flex-end;
        gap:10px;
    }
</style>
```

</head>

<body>

```
<button id="openDialog">Mở Dialog</button>

<!-- Dialog -->
<div class="dialog-wrapper" id="dialogWrapper">
    
    <div class="dialog" id="dialog">

        <h2>Thêm danh mục</h2>

        <input type="text" placeholder="Tên danh mục">

        <div class="dialog-footer">
            <button id="closeDialog">Đóng</button>
            <button>Lưu</button>
        </div>

    </div>

</div>
```

</body>

<script>

    const wrapper = document.getElementById("dialogWrapper");
    const dialog = document.getElementById("dialog");

    document.getElementById("openDialog").onclick = () => {
        wrapper.classList.add("active");
    };

    document.getElementById("closeDialog").onclick = () => {
        wrapper.classList.remove("active");
    };

    // click ra ngoài dialog thì đóng
    wrapper.addEventListener("click", function(e){
        if(!dialog.contains(e.target)){
            wrapper.classList.remove("active");
        }
    });

    // ESC để đóng
    document.addEventListener("keydown", function(e){
        if(e.key === "Escape"){
            wrapper.classList.remove("active");
        }
    });

</script>

</html>
