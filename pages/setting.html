<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Expense Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#eef4ff,#f8fbff);
            color:#1e293b;
            padding:30px;
        }

        .settings-container{
            max-width:1500px;
            margin:auto;
            display:grid;
            grid-template-columns:340px 1fr;
            gap:25px;
        }

        .card{
            background:#fff;
            border-radius:24px;
            box-shadow:0 20px 45px rgba(15,23,42,.08);
            overflow:hidden;
        }

        /* Sidebar */
        .sidebar-header{
            padding:30px;
            border-bottom:1px solid #e2e8f0;
        }

        .sidebar-header h2{
            font-size:30px;
            margin-bottom:8px;
        }

        .sidebar-header p{
            color:#64748b;
        }

        .menu-list{
            padding:20px;
        }

        .menu-item{
            display:flex;
            align-items:center;
            gap:18px;
            padding:18px 20px;
            margin-bottom:12px;
            border-radius:18px;
            cursor:pointer;
            transition:.25s;
            user-select:none;
        }

        .menu-item:hover{
            background:#f8fafc;
            transform:translateX(5px);
        }

        .menu-item.active{
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            color:#fff;
            box-shadow:0 12px 30px rgba(37,99,235,.35);
        }

        .menu-item i{
            font-size:22px;
            width:26px;
            text-align:center;
        }

        .menu-item span{
            font-size:16px;
            font-weight:600;
        }

        /* Content */
        .content-header{
            padding:35px 40px;
            border-bottom:1px solid #e2e8f0;
        }

        .content-header h1{
            font-size:34px;
            margin-bottom:10px;
        }

        .content-header p{
            color:#64748b;
            font-size:16px;
        }

        .content-body{
            padding:10px 40px 40px;
        }

        .setting-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:30px;
            padding:28px 0;
            border-bottom:1px solid #f1f5f9;
        }

        .setting-item:last-child{
            border-bottom:none;
        }

        .setting-info{
            flex:1;
        }

        .setting-title{
            font-size:18px;
            font-weight:700;
            margin-bottom:8px;
        }

        .setting-desc{
            color:#64748b;
            line-height:1.6;
        }

        .input,
        .select,
        .textarea{
            width:380px;
            padding:15px 18px;
            border:1px solid #cbd5e1;
            border-radius:14px;
            outline:none;
            font-size:15px;
            transition:.25s;
        }

        .textarea{
            min-height:140px;
            resize:vertical;
        }

        .input:focus,
        .select:focus,
        .textarea:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 5px rgba(37,99,235,.12);
        }

        .btn{
            padding:14px 28px;
            border:none;
            border-radius:14px;
            cursor:pointer;
            font-weight:700;
            font-size:15px;
            transition:.25s;
        }

        .btn-primary{
            background:#2563eb;
            color:#fff;
        }

        .btn-primary:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        /* Nút hủy */
        .btn-cancel{
            background: #df3f3fde;
            color: #ffffff;
            border: 1px solid #cbd5e1;
        }

        .btn-cancel:hover{
            background: #f8fafc;
            border-color: #94a3b8;
            color: #334155;
            transform: translateY(-2px);
        }

        .btn-success{
            background:linear-gradient(135deg,#10b981,#059669);
            color:#fff;
        }

        .btn-success:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 28px rgba(16,185,129,.35);
        }

        .badge{
            padding:12px 20px;
            border-radius:999px;
            background:#ecfdf5;
            color:#059669;
            font-weight:700;
        }

        .save-wrapper{
            margin-top:35px;
            text-align:right;
        }

        /* Switch */
        .switch{
            position:relative;
            width:64px;
            height:34px;
        }

        .switch input{
            display:none;
        }

        .slider{
            position:absolute;
            inset:0;
            background:#cbd5e1;
            border-radius:50px;
            cursor:pointer;
            transition:.3s;
        }

        .slider:before{
            content:'';
            position:absolute;
            width:26px;
            height:26px;
            left:4px;
            top:4px;
            background:#fff;
            border-radius:50%;
            transition:.3s;
        }

        .switch input:checked + .slider{
            background:#2563eb;
        }

        .switch input:checked + .slider:before{
            transform:translateX(30px);
        }

        @media(max-width:1100px){
            .settings-container{
                grid-template-columns:1fr;
            }

            .setting-item{
                flex-direction:column;
                align-items:stretch;
            }

            .input,
            .select,
            .textarea{
                width:100%;
            }
        }
    </style>
</head>
<body>

<div class="settings-container">
    <div class="card">
        <div class="sidebar-header">
            <h2>Cài Đặt</h2>
            <p>Expense Management System</p>
        </div>

        <div class="menu-list">
            <div class="menu-item active" data-page="general">
                <i class="fas fa-sliders-h"></i>
                <span>Cấu Hình Chung</span>
            </div>

            <div class="menu-item" data-page="transaction">
                <i class="fas fa-receipt"></i>
                <span>Cấu Hình Giao Dịch</span>
            </div>

            <div class="menu-item" data-page="category">
                <i class="fas fa-tags"></i>
                <span>Cấu Hình Danh Mục</span>
            </div>

            <div class="menu-item" data-page="wallet">
                <i class="fas fa-wallet"></i>
                <span>Cấu Hình Ví</span>
            </div>

            <div class="menu-item" data-page="fund">
                <i class="fas fa-piggy-bank"></i>
                <span>Cấu Hình Quỹ</span>
            </div>

            <div class="menu-item" data-page="report">
                <i class="fas fa-chart-line"></i>
                <span>Cấu Hình Báo Cáo</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="content-header">
            <h1 id="pageTitle"></h1>
            <p id="pageDescription"></p>
        </div>

        <div class="content-body" id="pageContent"></div>
    </div>
</div>

<script>
const pages = {
    general: {
        title: "Cấu Hình Chung",
        description: "Quản lý các thiết lập chung của hệ thống.",
        content: `
            ${input("Đơn Vị Tiền Tệ","Thiết lập đơn vị tiền tệ mặc định.","VND")}
            ${button("Thông Tin Đăng Nhập","Xem lịch sử đăng nhập hệ thống.","Xem Lịch Sử")}
            ${badge("Phiên Bản Hệ Thống","Phiên bản hiện tại của ứng dụng.","v1.1.0")}
            ${button("Nhật Ký Cập Nhật","Xem các thay đổi theo phiên bản.","Xem Nhật Ký")}
            ${button("Nhật Ký Hoạt Động","Theo dõi hoạt động của người dùng.","Xem Nhật Ký")}
            ${textarea("Gửi Phản Hồi","Đóng góp ý kiến cho nhà phát triển.")}
        `
    },

    transaction: {
        title: "Cấu Hình Giao Dịch",
        description: "Thiết lập quy tắc xử lý giao dịch.",
        content: `
            ${input("Tiền Tố Mã Giao Dịch","Tiền tố sinh mã tự động.","GD")}
            ${input("Số Thứ Tự Bắt Đầu","Giá trị bắt đầu của mã.","1")}
            ${toggle("Tự Động Sinh Mã","Hệ thống tự tạo mã giao dịch.")}
            ${toggle("Cho Phép Sửa Mã","Cho phép chỉnh sửa mã thủ công.")}
        `
    },

    category: {
        title: "Cấu Hình Danh Mục",
        description: "Quản lý danh mục thu và chi.",
        content: `
            ${toggle("Danh Mục Phân Cấp","Cho phép danh mục cha và con.")}
            ${toggle("Tự Động Tạo Danh Mục Mặc Định","Tạo dữ liệu mẫu khi khởi tạo.")}
            ${button("Quản Lý Danh Mục","Truy cập màn hình quản lý danh mục.","Mở Danh Mục")}
        `
    },

    wallet: {
        title: "Cấu Hình Ví",
        description: "Thiết lập ví và tài khoản.",
        content: `
            ${select("Ví Mặc Định","Ví được chọn khi tạo giao dịch.",
                ["Tiền Mặt","MB Bank","Vietcombank"])}
            ${toggle("Cho Phép Số Dư Âm","Áp dụng cho ví tín dụng.")}
            ${button("Quản Lý Ví","Thêm, sửa hoặc xóa ví.","Quản Lý")}
        `
    },

    fund: {
        title: "Cấu Hình Quỹ",
        description: "Thiết lập quỹ tiết kiệm và đầu tư.",
        content: `
            ${toggle("Tự Động Cập Nhật","Cập nhật tiến độ quỹ tự động.")}
            ${toggle("Thông Báo Khi Hoàn Thành","Gửi thông báo khi đạt mục tiêu.")}
            ${button("Quản Lý Quỹ","Truy cập danh sách quỹ.","Mở Quỹ")}
        `
    },

    report: {
        title: "Cấu Hình Thời Gian Báo Cáo",
        description: "Thiết lập chu kỳ và thời gian báo cáo.",
        content: `
            ${input("Ngày Bắt Đầu Tháng","Ngày đầu tiên của chu kỳ báo cáo.","1")}
            ${select("Chu Kỳ Báo Cáo","Tần suất tạo báo cáo.",
                ["Hàng Tháng","Hàng Quý","Hàng Năm"])}
            ${toggle("Tự Động Gửi Email","Gửi báo cáo định kỳ qua email.")}
        `
    }
};

function input(title, desc, value){
    return `
        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-title">${title}</div>
                <div class="setting-desc">${desc}</div>
            </div>
            <input class="input" value="${value}">
        </div>
    `;
}

function textarea(title, desc){
    return `
        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-title">${title}</div>
                <div class="setting-desc">${desc}</div>
            </div>
            <textarea class="textarea"></textarea>
        </div>
    `;
}

function button(title, desc, text){
    return `
        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-title">${title}</div>
                <div class="setting-desc">${desc}</div>
            </div>
            <button class="btn btn-primary">${text}</button>
        </div>
    `;
}

function badge(title, desc, text){
    return `
        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-title">${title}</div>
                <div class="setting-desc">${desc}</div>
            </div>
            <div class="badge">${text}</div>
        </div>
    `;
}

function toggle(title, desc){
    return `
        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-title">${title}</div>
                <div class="setting-desc">${desc}</div>
            </div>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>
    `;
}

function select(title, desc, options){
    return `
        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-title">${title}</div>
                <div class="setting-desc">${desc}</div>
            </div>
            <select class="select">
                ${options.map(o => `<option>${o}</option>`).join("")}
            </select>
        </div>
    `;
}

function loadPage(page){
    const data = pages[page];
    document.getElementById('pageTitle').textContent = data.title;
    document.getElementById('pageDescription').textContent = data.description;
    document.getElementById('pageContent').innerHTML = `
        ${data.content}
        <div class="save-wrapper">
            <button type="button" class="btn btn-cancel">
                <i class="fa-solid fa-rotate-left"></i>
                Hủy Thay Đổi
            </button>
            <button class="btn btn-success">
                <i class="fas fa-save"></i> Lưu Cấu Hình
            </button>
        </div>
    `;
}

document.querySelectorAll('.menu-item').forEach(item=>{
    item.addEventListener('click',function(){
        document.querySelectorAll('.menu-item')
            .forEach(x=>x.classList.remove('active'));

        this.classList.add('active');
        loadPage(this.dataset.page);
    });
});

loadPage('general');
</script>

</body>
</html>
