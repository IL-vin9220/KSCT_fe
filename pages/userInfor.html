<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông Tin Tài Khoản</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.profile-container{
    width:100%;
    display:flex;
    justify-content:center;
    padding:30px;
}

.profile-card{
    width:520px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

.profile-header{
    background:linear-gradient(135deg,#4f46e5,#6366f1);
    padding:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.avatar-section{
    display:flex;
    align-items:center;
    gap:20px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid white;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

.change-avatar{
    background:white;
    color:#4f46e5;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.status{
    padding:10px 16px;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
    background:rgba(255,255,255,0.2);
    color:white;
}

.profile-body{
    padding:30px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
    color:#374151;
}

.form-group input{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:14px;
    outline:none;
}

.form-group input:focus{
    border-color:#4f46e5;
}

.password-box{
    display:flex;
    gap:10px;
}

.password-box input{
    flex:1;
}

.password-box button{
    padding:0 20px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:12px;
    cursor:pointer;
}

.profile-footer{
    padding:20px 30px;
    border-top:1px solid #f3f4f6;
    display:flex;
    justify-content:flex-end;
    gap:15px;
}

.btn{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.cancel-btn{
    background:#e5e7eb;
}

.save-btn{
    background:#4f46e5;
    color:white;
}

.save-btn:hover{
    opacity:.9;
}

.cancel-btn:hover{
    background:#d1d5db;
}
</style>
</head>
<body>

<div class="profile-container">
    <div class="profile-card">

        <!-- Header -->
        <div class="profile-header">
            <div class="avatar-section">
                <div class="avatar">
                    <img id="avatarPreview" src="../assets/img/Background.png" alt="Avatar">
                </div>
                <button class="change-avatar">Đổi ảnh</button>
            </div>

            <div class="status">
                ● Đang hoạt động
            </div>
        </div>

        <!-- Body -->
        <div class="profile-body">

            <div class="form-group">
                <label>Tài khoản</label>
                <input type="text" value="dungnguyen" readonly>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="password-box">
                    <input type="password" id="passwordInput" value="123456789" readonly>
                    <button id="togglePassword">Hiện</button>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" value="dungnguyen@gmail.com">
            </div>

            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" value="0987654321">
            </div>

            <div class="form-group">
                <label>Tên hiển thị</label>
                <input type="text" value="Dung Nguyen">
            </div>

        </div>

        <!-- Footer -->
        <div class="profile-footer">
            <button class="btn cancel-btn">Hủy</button>
            <button class="btn save-btn">Lưu thay đổi</button>
        </div>

    </div>
</div>

<script>
const toggleBtn = document.getElementById("togglePassword");
const passwordInput = document.getElementById("passwordInput");

toggleBtn.addEventListener("click", function () {
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleBtn.innerText = "Ẩn";
    } else {
        passwordInput.type = "password";
        toggleBtn.innerText = "Hiện";
    }
});
</script>

</body>
</html>
