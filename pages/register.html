<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiểm Soát Chi Tiêu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:380px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.title{
text-align:center;
margin-bottom:25px;
font-size:22px;
color:#4f46e5;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#4f46e5;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:0.9;
}

.divider{
text-align:center;
margin:20px 0;
font-size:13px;
color:#888;
}

.social-btn{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
margin-top:10px;
cursor:pointer;
background:white;
}

.social-btn:hover{
background:#f3f3f3;
}

.link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.link a{
color:#4f46e5;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
Đăng ký tài khoản
</div>

<div class="form-group">
<label>Tài khoản</label>
<input type="text" id="username">
</div>

<div class="form-group">
<label>Mật khẩu</label>
<input type="password" id="password">
</div>

<div class="form-group">
<label>Nhập lại mật khẩu</label>
<input type="password" id="replypassword">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Số điện thoại</label>
<input type="text" id="phone">
</div>

<button onclick="register()">Đăng ký</button>

<div class="link">
Đã có tài khoản?
<a href="login.html">Đăng nhập</a>
</div>

</div>

<script>

function register(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;

let user={
username:username,
password:password,
email:email,
phone:phone
};

localStorage.setItem("user",JSON.stringify(user));

alert("Đăng ký thành công");

window.location.href="login.html";

}

function registerFacebook(){
alert("Demo đăng ký bằng Facebook");
}

function registerGoogle(){
alert("Demo đăng ký bằng Google");
}

</script>

</body>
</html>
