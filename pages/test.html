<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tree Diagram Demo</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f6f8;
        padding: 40px;
    }

    .container {
        width: 520px;
        background: white;
        padding: 20px 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h3 {
        margin-bottom: 20px;
    }

    /* TREE */
    .tree ul {
        list-style: none;
        margin: 0;
        padding-left: 30px;
        position: relative;
    }

    .tree ul::before {
        content: "";
        position: absolute;
        top: 0;
        left: 10px;
        border-left: 2px solid #ccc;
        height: 100%;
    }

    .tree li {
        position: relative;
        margin: 12px 0;
    }

    /* curve line */
    .tree li::before {
        content: "";
        position: absolute;
        top: 18px;
        left: -20px;
        width: 20px;
        height: 2px;
        background: #ccc;
    }

    /* remove line for root */
    .tree > ul::before {
        display: none;
    }

    .tree > ul > li::before {
        display: none;
    }

    /* last item cut vertical line */
    .tree li:last-child::after {
        content: "";
        position: absolute;
        left: -20px;
        top: 20px;
        width: 2px;
        height: calc(100% - 20px);
        background: white;
    }

    /* item */
    .item {
        background: #f0f2f5;
        padding: 10px 15px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
        display: inline-block;
    }

    .item:hover {
        background: #e4e6ea;
    }

    .children {
        display: none;
    }

    li.open > .children {
        display: block;
    }

    .toggle {
        font-weight: bold;
        margin-right: 6px;
        color: #666;
    }
</style>
</head>

<body>

<div class="container">
    <h3>Tree Diagram Danh Mục</h3>

    <div class="tree">
        <ul>
            <li>
                <div class="item">
                    <span class="toggle">+</span>
                    Chi tiêu
                </div>

                <ul class="children">
                    <li>
                        <div class="item">Ăn uống</div>
                    </li>

                    <li>
                        <div class="item">Đi lại</div>

                        <ul class="children">
                            <li>
                                <div class="item">Xăng xe</div>
                            </li>

                            <li>
                                <div class="item">Grab</div>
                            </li>
                        </ul>
                    </li>

                    <li>
                        <div class="item">Mua sắm</div>
                    </li>
                </ul>
            </li>

            <li>
                <div class="item">
                    <span class="toggle">+</span>
                    Thu nhập
                </div>

                <ul class="children">
                    <li>
                        <div class="item">Lương</div>
                    </li>

                    <li>
                        <div class="item">Thưởng</div>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</div>

<script>
    document.querySelectorAll('.item').forEach(item => {
        item.addEventListener('click', function (e) {
            const li = this.closest('li');
            li.classList.toggle('open');

            const toggle = this.querySelector('.toggle');
            if (toggle) {
                toggle.textContent = li.classList.contains('open') ? '-' : '+';
            }

            e.stopPropagation();
        });
    });
</script>

</body>
</html>
